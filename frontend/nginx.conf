server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to Laravel
    location /api/ {
        proxy_pass http://nginx:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
