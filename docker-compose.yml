version: '3.8'

services:
  app:
    build:
      context: ./blog-backend
    container_name: blog_app
    volumes:
      - ./blog-backend:/var/www
    networks:
      - blog_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: blog_nginx
    ports:
      - "8000:80"
    volumes:
      - ./blog-backend:/var/www
      - ./blog-backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - blog_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: blog_db
    environment:
      MYSQL_DATABASE: blog
      MYSQL_USER: blog_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - blog_network

networks:
  blog_network:

volumes:
  db_data:
